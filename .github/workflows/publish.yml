name: Publish site

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -el {0}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    name: Build
    runs-on: ubuntu-latest
    environment: page-build

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v7

      - name: Install mise-en-place
        uses: jdx/mise-action@v4

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.71.0
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: site

      - name: Install authentication
        run: |
          dvc remote modify --local vault user "$DVC_USER"
          dvc remote modify --local vault password "$DVC_PASS"
        shell: pixi run -e site bash -e {0}
        env:
          DVC_USER: ${{vars.DVC_WEBDAV_USER}}
          DVC_PASS: ${{secrets.DVC_WEBDAV_PASSWORD}}

      - name: Fetch site assets
        run: mise run web:fetch-assets -- -r vault
        shell: pixi run -e site bash -e {0}

      - name: Render site content
        run: mise run render-site
        shell: pixi run -e site bash -e {0}

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-site
          path: _site

  deploy:
    name: Deploy site
    needs: [build-site]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Fetch site artifact
        uses: actions/download-artifact@v8
        with:
          name: codex-site
          path: .
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
