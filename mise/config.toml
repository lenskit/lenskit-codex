[settings.python]
uv_venv_auto = "source"

[tools]
usage = "latest"
# needed when we are installing git deps
rust = "stable"
cargo-binstall = "latest"
"github:quarto-dev/quarto-cli" = "1.9"
uv = "latest"
# dev support servers
taplo = "latest"
ruff = "latest"
ty = "latest"
shfmt = "latest"
"pipx:tclint" = "latest"
hk = "latest"
fd = "latest"
"cargo:guartcl" = "latest"
yamlfmt = "latest"

[tools."pipx:dvc"]
version = "3"
extras = "s3,webdav"

[env]
JIMLIB = "{{config_root}}/src/tcl/pipeline:{{config_root}}/src/tcl/lib"
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"
