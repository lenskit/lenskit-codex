[settings.python]
uv_venv_auto = true

[tools]
usage = "latest"
"github:quarto-dev/quarto-cli" = "1.9"
go-jsonnet = "latest"
uv = "latest"
# dev support servers
tombi = "latest"
dprint = "latest"
"pipx:tclint" = "latest"
hk = "latest"

[tools."forgejo:mdekstrand/rust-jim"]
version = "0.4.0-beta3"
matching = "guartcl"

[env]
TCLLIBPATH = "{{config_root}}/src/tcl"
JIMLIB = "{{config_root}}/src/tcl/pipeline:{{config_root}}/src/tcl/lib"
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"
