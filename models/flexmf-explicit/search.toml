[search]
metric = "RMSE"
max_epochs = 50
min_epochs = 5
num_gpus = 0.2

[space.scorer]
embedding_size = { type = "int", min = 8, max = 1024, scale = "pow2" }
regularization = { type = "float", min = 1e-4, max = 10, scale = "log" }
learning_rate = { type = "float", min = 1e-3, max = 0.1, scale = "log" }

[pipeline]
file = "pipeline.toml"
