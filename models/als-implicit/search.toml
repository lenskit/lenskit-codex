[search]
metric = "RBP"
# max_epochs = 30

[space.scorer]
embedding_size = { type = "int", min = 8, max = 1024, scale = "pow2" }
regularization.user = { type = "float", min = 1e-5, max = 0.2, scale = "log" }
regularization.item = { type = "float", min = 1e-5, max = 0.2, scale = "log" }
weight = { type = "float", min = 5, max = 60 }

[pipeline]
file = "pipeline.toml"
